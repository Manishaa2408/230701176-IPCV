<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Drowsiness Detection</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #3b82f6;
            --alert: #ef4444;
            --success: #22c55e;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 1000px;
            width: 100%;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }
        .video-container {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: center;
        }
        .video-container img {
            width: 100%;
            border-radius: 8px;
            object-fit: contain;
            max-height: 500px;
        }
        .controls, .metrics {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        button, label.upload-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            display: inline-block;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: background 0.3s;
        }
        button:hover, label.upload-btn:hover {
            background-color: #2563eb;
        }
        input[type="file"] { display: none; }
        .metric-box {
            background-color: #0f172a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
            border: 1px solid #334155;
        }
        .metric-value {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 5px;
        }
        .status-normal { color: var(--success); }
        .status-drowsy { color: var(--alert); animation: blink 1s infinite; }
        
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .dashboard { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Driver Drowsiness Detection Dashboard</h1>
        <p>Real-time monitoring using Face Landmarks</p>
    </header>

    <div class="dashboard">
        <!-- Main Video Stream -->
        <div class="video-container">
            <!-- Ensure src is correct relative to Flask -->
            <img id="video-stream" src="/video_feed" alt="Video Stream Loading...">
        </div>

        <!-- Sidebar for Metrics and Controls -->
        <div>
            <div class="controls">
                <h2>Controls</h2>
                <button onclick="setMode('webcam')">🎥 Live Webcam</button>
                <br>
                <form id="uploadForm">
                    <label class="upload-btn">
                        📁 Upload Video
                        <input type="file" id="videoFile" accept="video/mp4,video/avi" onchange="uploadVideo()">
                    </label>
                </form>
                <p id="upload-status" style="font-size: 0.8rem; color: #94a3b8;"></p>
            </div>

            <div class="metrics">
                <h2>Live Metrics</h2>
                
                <div class="metric-box">
                    <div>Eye Aspect Ratio (EAR)</div>
                    <div class="metric-value" id="ear-val">0.00</div>
                </div>

                <div class="metric-box">
                    <div>PERCLOS</div>
                    <div class="metric-value" id="perclos-val">0.00%</div>
                </div>

                <div class="metric-box">
                    <div>Status</div>
                    <div class="metric-value status-normal" id="status-val">Normal</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function setMode(mode) {
        fetch('/set_mode', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({mode: mode})
        }).then(response => response.json()).then(data => {
            console.log(data.message);
            // Reload stream by resetting src
            document.getElementById('video-stream').src = '/video_feed?' + new Date().getTime();
            document.getElementById('upload-status').innerText = "Switched to Webcam";
        });
    }

    function uploadVideo() {
        const fileInput = document.getElementById('videoFile');
        const file = fileInput.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('video', file);

        document.getElementById('upload-status').innerText = "Uploading...";

        fetch('/upload', {
            method: 'POST',
            body: formData
        }).then(response => response.json()).then(data => {
            document.getElementById('upload-status').innerText = "Uploaded! Processing...";
            // Reload stream
            document.getElementById('video-stream').src = '/video_feed?' + new Date().getTime();
        }).catch(err => {
            document.getElementById('upload-status').innerText = "Error uploading.";
            console.error(err);
        });
    }

    // Poll metrics every 500ms
    setInterval(() => {
        fetch('/metrics').then(res => res.json()).then(data => {
            document.getElementById('ear-val').innerText = data.ear.toFixed(2);
            document.getElementById('perclos-val').innerText = data.perclos.toFixed(2) + '%';
            
            const statusEl = document.getElementById('status-val');
            statusEl.innerText = data.status;
            
            if (data.status === 'DROWSY') {
                statusEl.className = 'metric-value status-drowsy';
            } else {
                statusEl.className = 'metric-value status-normal';
            }
        }).catch(err => console.error(err));
    }, 500);
</script>

</body>
</html>
